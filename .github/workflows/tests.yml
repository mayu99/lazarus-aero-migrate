name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The suite is fully network-free: google.genai is stubbed in tests, the
      # differential oracle runs against the committed golden_io.json (real
      # GnuCOBOL bytes), and any cobc-requiring test is skipped when cobc is
      # absent. So no GEMINI_API_KEY and no GnuCOBOL install are needed here.
      - name: Run tests
        run: pytest -q
